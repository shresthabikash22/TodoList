<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Task</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; }
        .container { max-width: 520px; margin: 50px auto; padding: 24px; }
        .card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        h1 { font-size: 1.2rem; color: #2e5c8a; margin-bottom: 6px; }
        .task-meta { font-size: 0.78rem; color: #aaa; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 2px solid #eef2f7; }
        .status-note { background: #f0f2f5; border-radius: 6px; padding: 10px 12px; font-size: 0.82rem; color: #555; margin-bottom: 16px; line-height: 1.5; }
        .status-note strong { color: #2e5c8a; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.83rem; font-weight: 600; color: #444; margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 9px 11px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; font-family: inherit; }
        .form-group textarea { resize: vertical; height: 70px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #2e5c8a; }
        .actions { display: flex; gap: 10px; margin-top: 22px; }
        .btn { padding: 9px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.88rem; font-weight: 600; text-decoration: none; display: inline-block; text-align: center; }
        .btn-blue { background: #2e5c8a; color: white; }
        .btn-gray { background: #f0f2f5; color: #333; }
        .btn-blue:hover { background: #1d3f5e; }
        .btn-gray:hover { background: #e0e2e5; }
        .error-message { color: #721c24; background: #f8d7da; border: 1px solid #f5c6cb; padding: 10px; border-radius: 6px; margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Edit Task</h1>

        <!-- Display error message if any -->
        <div class="error-message" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <!-- Task metadata -->
        <div class="task-meta">
            <span th:text="'ID: ' + ${task.id}"></span>
            &nbsp;·&nbsp;
            <span th:text="'Created: ' + ${task.formattedCreatedDate}"></span>
        </div>

        <!-- Current status shown read-only -->
        <div class="status-note">
            Current status:
            <strong th:text="${task.status.displayName}"></strong>
            &nbsp;·&nbsp; Change status from the dashboard dropdown.
        </div>

        <!-- Edit form -->
        <form th:action="@{/tasks/{id}/update(id=${task.id})}" method="post">

            <!-- Hidden input for task ID (optional but good practice) -->
            <input type="hidden" name="id" th:value="${task.id}" />

            <div class="form-group">
                <label>Title *</label>
                <input type="text" name="title"
                       th:value="${task.title}"
                       placeholder="Enter task title"
                       required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description"
                          placeholder="Enter task description"><th:block th:text="${task.description}"></th:block></textarea>
            </div>

            <div class="form-group">
                <label>Assign To *</label>
                <select name="assignedUserId" required>
                    <option value="">Select a user...</option>
                    <option th:each="user : ${users}"
                            th:value="${user.id}"
                            th:text="${user.username}"
                            th:selected="${user.id == task.assignedUserId}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Category *</label>
                <select name="category" required>
                    <option value="">Select a category...</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.name()}"
                            th:text="${cat.displayName}"
                            th:selected="${cat == task.category}">
                    </option>
                </select>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-blue">Save Changes</button>
                <a href="/" class="btn btn-gray">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
